<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zombinema</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        overflow: hidden;
      }

      html,
      body {
        width: 100%;
        height: 100%;
      }

      #renderCanvas {
        width: 100%;
        height: 100%;
        display: block;
        touch-action: none;
      }

      #crosshair {
        position: fixed;
        top: 50%;
        left: 50%;
        width: 20px;
        height: 20px;
        margin-left: -10px;
        margin-top: -10px;
        pointer-events: none;
        z-index: 100;
      }

      #crosshair::before,
      #crosshair::after {
        content: "";
        position: absolute;
        background: #00ff00;
        box-shadow: 0 0 2px rgba(0, 0, 0, 0.8);
      }

      #crosshair::before {
        width: 2px;
        height: 20px;
        top: 0;
        left: 9px;
      }

      #crosshair::after {
        width: 20px;
        height: 2px;
        top: 9px;
        left: 0;
      }

      #instructions {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: white;
        font-family: Arial, sans-serif;
        font-size: 24px;
        z-index: 20;
        user-select: none;
        text-shadow: 0 0 6px rgba(0, 0, 0, 0.8);
      }
    </style>
  </head>
  <body>
    <canvas id="renderCanvas"></canvas>
    <div id="crosshair"></div>
    <div id="instructions">Click to play</div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
